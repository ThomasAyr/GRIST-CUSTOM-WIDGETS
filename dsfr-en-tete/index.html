<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En-tête DSFR</title>

    <!-- Grist API -->
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

    <!-- DSFR CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/utility/utilities.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/utility/icons/icons.min.css">


    <style>
        .fr-header,
        .fr-header__brand {
            filter: none !important;
            --hover: transparent;
        }
    </style>
</head>

<body>
    <header role="banner" class="fr-header" id="header-2">
        <div class="fr-header__body">
            <div class="fr-container">
                <div class="fr-header__body-row">
                    <div class="fr-header__brand fr-enlarge-link">
                        <div class="fr-header__brand-top">
                            <div class="fr-header__logo">
                                <p class="fr-logo" id="intitule-officiel">République<br>Française</p>
                            </div>
                            <div class="fr-header__operator" id="operator-section" style="display: none;">
                                <img class="fr-responsive-img" style="max-width: 9.0625rem;" id="logo-img" alt="Logo" />
                            </div>
                        </div>
                        <div class="fr-header__service">
                            <p class="fr-header__service-title" id="nom-service"></p>
                            <p class="fr-header__service-tagline" id="baseline"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- DSFR JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.module.min.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.nomodule.min.js" nomodule></script>

    <script>
        grist.ready({
            columns: [
                "intitule_officiel",
                "nom_service",
                "titre_composante_1",
                "titre_composante_2",
                "baseline",
                "logo"
            ],
            requiredAccess: 'full',
            allowSelectBy: true
        });

        function toDisplayString(value) {
            if (value === null || value === undefined) return '';

            if (Array.isArray(value)) {
                return value
                    .map(v => toDisplayString(v))
                    .filter(v => v && v.trim() !== '')
                    .join(', ');
            }

            if (typeof value === 'object') {
                if ('displayValue' in value && value.displayValue != null) return String(value.displayValue);
                if ('label' in value && value.label != null) return String(value.label);
                if ('name' in value && value.name != null) return String(value.name);
                if ('value' in value && value.value != null) return String(value.value);

                try {
                    return JSON.stringify(value);
                } catch {
                    return '';
                }
            }

            return String(value);
        }

        function formatIntitule(intitule) {
            const value = toDisplayString(intitule).trim();

            if (value === 'Région académique Occitanie') {
                return 'Région académique<br>Occitanie';
            }
            if (value === 'Académie de Toulouse') {
                return 'Académie<br>de Toulouse';
            }
            if (value === 'Académie de Montpellier') {
                return 'Académie<br>de Montpellier';
            }
            if (value) {
                return value.replace(/\n/g, '<br>');
            }
            return 'République<br>Française';
        }

        async function updateLogo(logoAttachments) {
            const operatorSection = document.getElementById('operator-section');
            const logoImg = document.getElementById('logo-img');

            if (!logoAttachments || !Array.isArray(logoAttachments) || logoAttachments.length === 0) {
                operatorSection.style.display = 'none';
                return;
            }

            try {
                const tokenInfo = await grist.docApi.getAccessToken({ readOnly: true });
                const attachmentId = logoAttachments[0];
                const logoUrl = `${tokenInfo.baseUrl}/attachments/${attachmentId}/download?auth=${tokenInfo.token}`;

                logoImg.src = logoUrl;
                logoImg.onload = () => {
                    operatorSection.style.display = 'block';
                };
                logoImg.onerror = () => {
                    operatorSection.style.display = 'none';
                };

            } catch (error) {
                console.error('Erreur accès attachement:', error);
                operatorSection.style.display = 'none';
            }
        }

        async function updateContent(mapped) {
            document.getElementById('intitule-officiel').innerHTML = formatIntitule(mapped?.intitule_officiel);

            const titre = [
                toDisplayString(mapped?.nom_service),
                toDisplayString(mapped?.titre_composante_1),
                toDisplayString(mapped?.titre_composante_2)
            ].filter(v => v.trim() !== '').join(' - ');

            document.getElementById('nom-service').textContent = titre;
            document.getElementById('baseline').textContent = toDisplayString(mapped?.baseline);

            if (mapped && mapped.logo) {
                await updateLogo(mapped.logo);
            } else {
                document.getElementById('operator-section').style.display = 'none';
            }
        }

        grist.onRecord(async function (record, mappings) {
            console.log('record reçu :', record);
            console.log('mappings :', mappings);

            if (record) {
                const mapped = grist.mapColumnNames(record, mappings);
                console.log('mapped :', mapped);
                await updateContent(mapped);
            } else {
                await updateContent(null);
            }
        });
    </script>
</body>

</html>
